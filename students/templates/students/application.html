{% extends 'students/base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3 class="text-center mb-4">📝 Course Application</h3>

    <form method="post">
      {% csrf_token %}

      <input
        type="text"
        name="first_name"
        value="{{ data.first_name|default:'' }}"
        class="form-control mb-2"
        placeholder="First Name"
        required
      >

      <input
        type="text"
        name="last_name"
        value="{{ data.last_name|default:'' }}"
        class="form-control mb-2"
        placeholder="Last Name"
        required
      >

      <input
        type="text"
        name="phone"
        value="{{ data.phone|default:'' }}"
        class="form-control mb-2"
        placeholder="Phone"
        required
      >

      <input
        type="text"
        name="country"
        value="{{ data.country|default:'' }}"
        class="form-control mb-2"
        placeholder="Country"
        required
      >

      <select name="gender" class="form-control mb-2" required>
        <option value="">Select Gender</option>
        <option value="Male" {% if data and data.gender == 'Male' %}selected{% endif %}>
          Male
        </option>
        <option value="Female" {% if data and data.gender == 'Female' %}selected{% endif %}>
          Female
        </option>
      </select>

      <select name="course" class="form-control mb-2" required>
        <option value="">Select Course</option>
        {% for c in courses %}
          <option value="{{ c }}" {% if data and data.course == c %}selected{% endif %}>
            {{ c }}
          </option>
        {% endfor %}
      </select>

      <label class="mt-2">Course Duration</label>

      <input
        type="date"
        name="start_date"
        value="{{ data.start_date|default:'' }}"
        class="form-control mb-2"
        required
      >

      <input
        type="date"
        name="end_date"
        value="{{ data.end_date|default:'' }}"
        class="form-control mb-3"
        required
      >

      <button type="submit" class="btn btn-success w-100">
        Submit Application
      </button>
    </form>
  </div>
</div>
{% endblock %}
