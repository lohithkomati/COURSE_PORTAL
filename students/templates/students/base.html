<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Career Course Portal</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f7fb;
    }

    .navbar {
      background: linear-gradient(90deg, #0d6efd, #6610f2);
    }

    .navbar a {
      color: white !important;
      font-weight: 500;
    }

    footer {
      background: #0d6efd;
      color: white;
      padding: 15px;
      margin-top: 50px;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(90deg, #0d6efd, #6610f2);
      border: none;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
      url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");
      background-size: cover;
      background-position: center;
      color: white;
      padding: 120px 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand text-white" href="/">🎓 Career Portal</a>

    <div class="ms-auto">
      {% if user.is_authenticated %}
        <a href="/dashboard/" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/logout/" class="btn btn-outline-light btn-sm ms-2">Logout</a>
      {% else %}
        <a href="/login/" class="btn btn-light btn-sm">Login</a>
        <a href="/register/" class="btn btn-outline-light btn-sm ms-2">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<footer>
  © 2026 Career Course Portal | Learn • Grow • Succeed
</footer>

</body>
</html>
